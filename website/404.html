<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Worker Orchestrator</title>
  <meta name="description" content="Page not found.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --plaster: #f2efe8;
      --espresso: #1a1714;
      --taupe: #7a7269;
      --sand: #e6dfd4;
      --sienna: #c4551a;
      --font-display: 'Syne', sans-serif;
      --font-body: 'Schibsted Grotesk', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { min-height: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--plaster);
      color: var(--espresso);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--taupe);
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 1rem;
      color: var(--espresso);
    }
    p {
      color: var(--taupe);
      font-size: 1.1rem;
      max-width: 40ch;
      margin-bottom: 2.5rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 1.6rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 4px;
      background: var(--espresso);
      color: var(--plaster);
      text-decoration: none;
      transition: all 0.25s ease;
    }
    a:hover {
      background: var(--sienna);
      color: white;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="code">HTTP 404</div>
  <h1>404</h1>
  <p>This page does not exist. It may have been moved, renamed, or never existed at all.</p>
  <a href="index.html">← Back to home</a>
</body>
</html>
